<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinit Mobile Limited — Ultimate Catalog & Compare Pro</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      /* Dark Theme */
      --bg-base: #09090b; 
      --card-bg: rgba(24, 24, 27, 0.6);
      --card-border: rgba(255, 255, 255, 0.1);
      --primary: #8b5cf6; 
      --primary-hover: #a78bfa;
      --primary-alpha: rgba(139, 92, 246, 0.2);
      --text-main: #f4f4f5;
      --text-soft: #a1a1aa;
      --success: #10b981; 
      --success-alpha: rgba(16, 185, 129, 0.2);
      --danger: #ef4444;
      --danger-alpha: rgba(239, 68, 68, 0.2);
      --input-bg: rgba(9, 9, 11, 0.6);
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --glass-blur: blur(16px);
      
      --mesh-color-1: radial-gradient(at 10% 20%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
      --mesh-color-2: radial-gradient(at 90% 80%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
    }
    
    body.light-theme {
      --bg-base: #f8fafc; 
      --card-bg: rgba(255, 255, 255, 0.7);
      --card-border: rgba(0, 0, 0, 0.08);
      --primary: #4f46e5; 
      --primary-hover: #6366f1;
      --primary-alpha: rgba(79, 70, 229, 0.15);
      --text-main: #0f172a;
      --text-soft: #64748b;
      --input-bg: rgba(241, 245, 249, 0.6);
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.05);
      
      --mesh-color-1: radial-gradient(at 10% 20%, rgba(79, 70, 229, 0.1) 0px, transparent 50%);
      --mesh-color-2: radial-gradient(at 90% 80%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
    }

    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background-color: var(--bg-base); 
      background-image: var(--mesh-color-1), var(--mesh-color-2);
      background-attachment: fixed;
      color: var(--text-main); 
      min-height: 100vh; padding: 24px 16px; 
      transition: background-color 0.5s ease;
      overflow-x: hidden;
    }

    /* SCROLL LOCK FOR MODALS */
    body.modal-open { overflow: hidden; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    h1, h2, h3, .name { font-family: 'Plus Jakarta Sans', sans-serif; }
    #app-container { max-width: 1200px; margin: 0 auto; padding-bottom: 100px; }
    
    .glass {
      background: var(--card-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-soft);
    }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 16px 24px; border-radius: 20px; z-index: 100; position: relative;}
    .brand-group { display: flex; align-items: center; gap: 16px; }
    .logo-icon { width: 48px; height: 48px; border-radius: 14px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
    .brand-text .name { font-size: 24px; font-weight: 800; display: flex; align-items: center; }
    .role-badge { background: var(--primary-alpha); color: var(--primary); font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 20px; margin-left: 12px; }
    
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .social-link { color: var(--text-main); display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; background: var(--input-bg); border: 1px solid var(--card-border); transition: 0.3s; }
    .social-link:hover { color: var(--primary); border-color: var(--primary); transform: scale(1.05); }
    .action-btn { background: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-main); cursor: pointer; padding: 12px; border-radius: 14px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px;}
    .action-btn:hover { color: var(--primary); border-color: var(--primary); transform: scale(1.05); }
    .badge { background: var(--danger); color: white; border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 800; }
    
    /* Sticky Search */
    .sticky-bar { position: sticky; top: 10px; z-index: 50; display: flex; gap: 12px; margin-bottom: 24px; }
    .search-wrapper { flex: 1; position: relative; }
    .search-wrapper input { width: 100%; padding: 16px 24px 16px 50px; border-radius: 16px; border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text-main); font-size: 16px; outline: none; transition: 0.3s; backdrop-filter: var(--glass-blur); box-shadow: var(--shadow-soft); }
    .search-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-alpha), var(--shadow-soft); }
    .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-soft); }
    
    /* Filters */
    .controls-wrapper { border-radius: 20px; padding: 20px 24px; margin-bottom: 24px; display: flex; flex-direction: column; gap: 20px; }
    .cat-filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .quick-btn { background: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-soft); font-size: 13px; font-weight: 600; padding: 10px 16px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 6px; }
    .quick-btn:hover { color: var(--text-main); border-color: var(--text-soft); }
    .quick-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 15px var(--primary-alpha); }
    
    .price-slider-container { display: flex; align-items: center; gap: 16px; width: 100%; border-top: 1px solid var(--card-border); padding-top: 20px; }
    .price-slider-container label { font-size: 14px; font-weight: 600; color: var(--text-soft); white-space: nowrap; }
    .price-slider { flex: 1; accent-color: var(--primary); cursor: pointer; }
    .price-display { background: var(--input-bg); padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 14px; border: 1px solid var(--card-border); }

    /* Grid & Cards */
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; perspective: 1000px; }
    .metric-card { border-radius: 20px; padding: 24px; position: relative; display: flex; flex-direction: column; cursor: pointer; transition: transform 0.1s ease-out, box-shadow 0.3s ease, border-color 0.3s ease; transform-style: preserve-3d; opacity: 0; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .metric-card:hover { border-color: var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.4); z-index: 2; }
    body.light-theme .metric-card:hover { box-shadow: 0 15px 35px rgba(79, 70, 229, 0.15); }
    
    .card-header { margin-bottom: 16px; padding-right: 40px; position: relative; }
    .phone-name { font-size: 22px; font-weight: 800; margin-bottom: 4px; padding-right: 24px; }
    .phone-price { font-size: 18px; font-weight: 700; color: var(--success); }
    
    .fav-toggle-btn { position: absolute; top: 0; right: 0; background: transparent; border: none; cursor: pointer; color: var(--text-soft); transition: 0.2s; display: flex; align-items: center; justify-content: center; padding: 4px; }
    .fav-toggle-btn:hover { transform: scale(1.2); color: var(--danger); }
    .fav-toggle-btn.active { color: var(--danger); }

    .variant-selector-wrapper { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
    .variant-selector-wrapper label { font-size: 11px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.5px; }
    .variant-select { width: 100%; background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 10px; color: var(--text-main); padding: 8px 12px; font-size: 13px; font-weight: 600; outline: none; cursor: pointer; transition: 0.2s; }
    .variant-select:focus { border-color: var(--primary); }

    .antutu-container { margin-bottom: 20px; pointer-events: none; }
    .antutu-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-soft); }
    .antutu-header span:last-child { color: var(--text-main); font-weight: 800; font-family: 'Plus Jakarta Sans', sans-serif;}
    .antutu-track { width: 100%; height: 8px; background: var(--input-bg); border-radius: 10px; overflow: hidden; border: 1px solid var(--card-border); }
    .antutu-fill { height: 100%; border-radius: 10px; transition: width 1.5s cubic-bezier(0.16, 1, 0.3, 1); width: 0%; }

    .card-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; pointer-events: none; }
    .card-pill { background: var(--input-bg); border: 1px solid var(--card-border); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 10px; display: flex; align-items: center; gap: 6px; }
    .card-pill svg { color: var(--primary); }

    .compare-label { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 14px; cursor: pointer; font-size: 14px; font-weight: 700; transition: 0.3s; margin-top: auto; z-index: 10; position: relative; }
    .compare-label:hover { border-color: var(--primary); background: var(--primary-alpha); }
    .compare-label input { display: none; }
    .custom-checkbox { width: 22px; height: 22px; border: 2px solid var(--text-soft); border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .custom-checkbox svg { width: 14px; height: 14px; color: white; opacity: 0; transform: scale(0.5); transition: 0.2s; }
    .compare-label input:checked + .custom-checkbox { background: var(--primary); border-color: var(--primary); }
    .compare-label input:checked + .custom-checkbox svg { opacity: 1; transform: scale(1); }

    /* Compare Bar Bottom */
    #compare-bar { position: fixed; bottom: -120px; left: 50%; transform: translateX(-50%); background: var(--card-bg); backdrop-filter: blur(24px); border: 1px solid var(--card-border); padding: 16px 24px; border-radius: 20px; display: flex; align-items: center; gap: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); transition: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 100; width: max-content; max-width: 90vw; }
    #compare-bar.show { bottom: 40px; }
    .selected-avatars { display: flex; gap: 8px; }
    .avatar-bubble { width: 40px; height: 40px; border-radius: 50%; background: var(--input-bg); border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; text-align: center; line-height: 1.1; animation: slideUp 0.3s ease; }
    .btn-compare-action { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 15px; }
    .btn-compare-action:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 8px 20px var(--primary-alpha); }

    /* Modals */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.3s ease; }
    .modal-overlay.show { opacity: 1; }
    .modal-content { background: var(--bg-base); background-image: var(--mesh-color-1); border: 1px solid var(--card-border); border-radius: 24px; width: 100%; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.5); transform: scale(0.95); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .modal-overlay.show .modal-content { transform: scale(1); }
    
    .compare-modal-size { max-width: 1400px; }
    .details-modal-size { max-width: 900px; }
    
    .close-modal { position: absolute; top: 20px; right: 20px; background: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-main); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; z-index: 50;}
    .close-modal:hover { background: var(--danger); color: white; border-color: var(--danger); transform: rotate(90deg); }

    /* Epic Clash Overlay (Mobile Friendly) */
    #clash-screen { position: absolute; inset: 0; background: var(--bg-base); z-index: 40; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; gap: 24px; text-align: center; padding: 20px; }
    .clash-name { opacity: 0; transform: translateY(-30px); animation: clashIn 0.5s forwards; line-height: 1.2; max-width: 90vw; word-wrap: break-word;}
    .clash-name:last-child { transform: translateY(30px); }
    .clash-vs { color: var(--primary); font-size: 48px; font-style: italic; opacity: 0; animation: popIn 0.4s 0.3s forwards; }
    @keyframes clashIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0); } 80% { transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

    /* Compare Table */
    .table-container { overflow-y: auto; overflow-x: auto; padding: 30px; opacity: 0; transition: opacity 0.5s 1.2s; width: 100%; -webkit-overflow-scrolling: touch; }
    .compare-table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 700px; }
    .compare-table th, .compare-table td { padding: 16px; border-bottom: 1px solid var(--card-border); border-right: 1px solid var(--card-border); text-align: center; }
    .compare-table th:first-child, .compare-table td:first-child { border-left: 1px solid var(--card-border); position: sticky; left: 0; background: var(--card-bg); z-index: 20; backdrop-filter: blur(10px); }
    .compare-table tr:first-child th { border-top: 1px solid var(--card-border); border-radius: 12px 12px 0 0; }
    .compare-table th { background: rgba(0,0,0,0.4); font-weight: 800; color: var(--text-main); font-size: 16px; position: sticky; top: 0; z-index: 30; backdrop-filter: blur(10px); }
    .compare-table td { color: var(--text-soft); font-size: 14px; font-weight: 500; transition: background 0.2s; background: var(--card-bg);}
    .compare-table tr:hover td { background: var(--input-bg); color: var(--text-main); }
    .spec-row-title { font-weight: 800 !important; color: var(--primary) !important; text-align: left !important; background: rgba(139, 92, 246, 0.05) !important; font-size: 15px !important; letter-spacing: 1px; text-transform: uppercase; padding: 12px 16px !important;}
    .spec-label { font-weight: 700; color: var(--text-main); text-align: left !important; }

    /* Bento Grid for Details Modal */
    .bento-modal-body { padding: 30px; overflow-y: auto; }
    .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; grid-auto-rows: minmax(100px, auto); }
    .bento-box { background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden; }
    
    .bento-header { grid-column: span 4; text-align: center; background: linear-gradient(135deg, var(--card-bg), var(--primary-alpha)); }
    .bento-header h2 { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
    .bento-header p { font-size: 24px; color: var(--success); font-weight: 800; }
    
    .famous-badge { display: inline-block; background: var(--primary-alpha); color: var(--primary); font-weight: 800; padding: 8px 16px; border-radius: 12px; margin-top: 12px; font-size: 14px; border: 1px solid var(--primary); }

    .bento-score { grid-column: span 2; align-items: center; text-align: center; }
    .bento-score-title { font-size: 14px; color: var(--text-soft); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .bento-score-num { font-size: 36px; font-weight: 900; font-family: 'Plus Jakarta Sans'; background: linear-gradient(90deg, var(--primary), #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .bento-rings { grid-column: span 4; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; background: transparent; border: none; padding: 0; }
    .ring-box { background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;}
    
    .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; }
    .circle-bg { fill: none; stroke: var(--card-border); stroke-width: 3.8; }
    .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; transition: stroke-dasharray 1.5s cubic-bezier(0.16, 1, 0.3, 1); width: 0%; }
    .ring-text { font-size: 12px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; margin-top: 8px;}
    .ring-icon { font-size: 20px; margin-bottom: -5px;}

    /* Deep Dive Specs Table (Inside Bento) */
    .bento-deep-dive { grid-column: span 4; padding: 0; background: transparent; border: none; }
    .deep-dive-section { background: var(--input-bg); border: 1px solid var(--card-border); border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
    .deep-dive-header { background: rgba(255,255,255,0.03); padding: 14px 20px; font-weight: 800; font-size: 16px; color: var(--primary); border-bottom: 1px solid var(--card-border); display: flex; align-items: center; gap: 10px; }
    .deep-dive-row { display: flex; border-bottom: 1px solid var(--card-border); }
    .deep-dive-row:last-child { border-bottom: none; }
    .deep-dive-label { width: 35%; padding: 14px 20px; font-weight: 600; color: var(--text-main); border-right: 1px solid var(--card-border); font-size: 14px; background: rgba(0,0,0,0.1); }
    .deep-dive-value { width: 65%; padding: 14px 20px; color: var(--text-soft); font-size: 14px; line-height: 1.5; }

    /* ========================================= */
    /* NEW: SPEC CATEGORY COLOR ENHANCEMENTS     */
    /* ========================================= */
    .spec-cat-display { color: #3b82f6 !important; background: rgba(59, 130, 246, 0.1) !important; border-left: 4px solid #3b82f6 !important; }
    .spec-cat-perf { color: #f97316 !important; background: rgba(249, 115, 22, 0.1) !important; border-left: 4px solid #f97316 !important; }
    .spec-cat-cam { color: #ec4899 !important; background: rgba(236, 72, 153, 0.1) !important; border-left: 4px solid #ec4899 !important; }
    .spec-cat-selfie { color: #d946ef !important; background: rgba(217, 70, 239, 0.1) !important; border-left: 4px solid #d946ef !important; }
    .spec-cat-bat { color: #10b981 !important; background: rgba(16, 185, 129, 0.1) !important; border-left: 4px solid #10b981 !important; }
    .spec-cat-build { color: #14b8a6 !important; background: rgba(20, 184, 166, 0.1) !important; border-left: 4px solid #14b8a6 !important; }
    .spec-cat-misc { color: #8b5cf6 !important; background: rgba(139, 92, 246, 0.1) !important; border-left: 4px solid #8b5cf6 !important; }
    .spec-cat-hw { color: #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; border-left: 4px solid #ef4444 !important; }

    @media (max-width: 768px) {
      .brand-group { flex-direction: row; }
      .bento-grid { grid-template-columns: 1fr; }
      .bento-header, .bento-score, .bento-rings, .bento-deep-dive { grid-column: span 1; }
      .bento-rings { grid-template-columns: 1fr 1fr; gap: 12px;}
      .header { flex-direction: column; align-items: flex-start; gap: 16px; }
      
      #compare-bar { width: calc(100% - 32px); flex-direction: column; gap: 12px; border-radius: 16px; bottom: -150px; }
      #clash-screen { flex-direction: column; gap: 12px; font-size: 26px; }
      .clash-vs { font-size: 32px; }
      
      .table-container { padding: 16px; }
      .compare-table th, .compare-table td { padding: 12px; font-size: 13px; }
      
      .deep-dive-row { flex-direction: column; }
      .deep-dive-label { width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 16px; }
      .deep-dive-value { width: 100%; padding: 10px 16px; }
    }
  </style>
</head>
<body>

  <div id="app-container">
    
    <!-- Header -->
    <div class="header glass">
      <div class="brand-group">
        <div class="logo-icon">
          <img src="logo.jpg" alt="Vinit Mobile Logo" onerror="this.src='https://via.placeholder.com/48/8b5cf6/ffffff?text=VM'"/>
        </div>
        <div class="brand-text">
          <div class="name">Vinit Mobile Limited <span class="role-badge">PRO</span></div>
          <div style="font-size: 13px; font-weight: 600; color: var(--text-soft); margin-top: 4px;">Expanded Inventory & Smart Compare</div>
        </div>
      </div>
      <div class="header-actions">
        <!-- Social Links Added Here -->
        <a href="https://www.facebook.com/vinitmobilelimited/" target="_blank" class="social-link" title="Follow us on Facebook">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22.675 0h-21.35c-.732 0-1.325.593-1.325 1.325v21.351c0 .731.593 1.324 1.325 1.324h11.495v-9.294h-3.128v-3.622h3.128v-2.671c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.312h3.587l-.467 3.622h-3.12v9.293h6.116c.73 0 1.323-.593 1.323-1.325v-21.35c0-.732-.593-1.325-1.325-1.325z"/></svg>

        const matchPrice = m.variants[variantIdx].numPrice <= maxP;
        const matchCat = activeCategories.length === 0 || m.categories.some(c => activeCategories.includes(c)) || activeCategories.includes(m.brand);
        const matchSearch = m.name.toLowerCase().includes(query) || m.brand.toLowerCase().includes(query) || m.perf.chip.toLowerCase().includes(query);
        return matchCat && matchSearch && matchPrice;
      });

      if(filtered.length === 0) {
        gridContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 60px; color:var(--text-soft);"><h3>No phones match your criteria.</h3></div>`; return;
      }

      filtered.forEach((phone, index) => {
        const isChecked = selectedForCompare.includes(phone.slug) ? 'checked' : '';
        const antutuPercent = (phone.antutu / 3000000) * 100;
        const antutuColor = phone.antutu > 1500000 ? 'linear-gradient(90deg, #8b5cf6, #3b82f6)' : (phone.antutu > 800000 ? 'linear-gradient(90deg, #10b981, #34d399)' : 'linear-gradient(90deg, #f59e0b, #fbbf24)');
        
        const variantIdx = selectedVariants[phone.slug];
        const currentVariant = phone.variants[variantIdx];
        const isFavorited = favourites.includes(phone.slug) ? 'active' : '';

        const card = document.createElement('div');
        card.className = 'metric-card glass';
        card.style.animationDelay = `${index * 0.08}s`;
        
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left; const y = e.clientY - rect.top;
          card.style.transform = `perspective(1000px) rotateX(${((y / rect.height) - 0.5) * -10}deg) rotateY(${((x / rect.width) - 0.5) * 10}deg) scale3d(1.02, 1.02, 1.02)`;
        });
        card.addEventListener('mouseleave', () => card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)');

        card.onclick = (e) => { 
          if(!e.target.closest('label') && !e.target.closest('select') && !e.target.closest('button')) {
            showDetailsModal(phone.slug); 
          }
        };

        card.innerHTML = `

            <div class="phone-name">${phone.name}</div>
            <div class="phone-price">${currentVariant.price}</div>

            </button>

              ${phone.variants.map((v, i) => `<option value="${i}" ${i === variantIdx ? 'selected' : ''}>${v.ramRom} (${v.price})</option>`).join('')}
            </select>
          </div>

          <div class="card-pills">
            <div class="card-pill"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/></svg> ${currentVariant.ramRom.split(' / ')[0]} Tier</div>
            <div class="card-pill"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg> ${phone.perf.chip.split(' (')[0]}</div>

    function runCounters() {
      document.querySelectorAll('.counter').forEach(el => {
        const target = +el.getAttribute('data-target'); let count = 0; const increment = target / 50;
        const update = () => { count += increment; if(count < target) { el.innerText = Math.ceil(count).toLocaleString(); requestAnimationFrame(update); } else { el.innerText = target.toLocaleString(); } };
        update();
      });
    }

    document.querySelectorAll('.quick-btn[data-cat]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const cat = e.target.getAttribute('data-cat');
        if (activeCategories.includes(cat)) { activeCategories = activeCategories.filter(c => c !== cat); e.target.classList.remove('active'); }
        else { activeCategories.push(cat); e.target.classList.add('active'); }
        renderGrid();
      });
    });
    document.getElementById('btn-clear-cats').addEventListener('click', () => { activeCategories = []; document.querySelectorAll('.quick-btn[data-cat]').forEach(b => b.classList.remove('active')); renderGrid(); });
    searchInput.addEventListener('input', renderGrid);
    priceSlider.addEventListener('input', (e) => { document.getElementById('price-display').innerText = `Up to ₹${parseInt(e.target.value).toLocaleString()}`; renderGrid(); });

    // Compare System
    function toggleCompare(slug, checkbox) {
      if (checkbox.checked) {
        if (selectedForCompare.length >= 3) { alert("Maximum 3 phones allowed."); checkbox.checked = false; return; }
        selectedForCompare.push(slug);
      } else { selectedForCompare = selectedForCompare.filter(s => s !== slug); }
      updateCompareBar();

    function clearCompare() { selectedForCompare = []; document.querySelectorAll('.compare-label input').forEach(cb => cb.checked = false); updateCompareBar(); }

    function sendPhoneSpecs(slug) {
      const phone = mobiles.find(m => m.slug === slug);
      if(!phone) return;
      const activeVariant = phone.variants[selectedVariants[slug]];
      
      let text = `📱 *${phone.name}* Specs Overview (${activeVariant.ramRom})\n💵 Price: ${activeVariant.price}\n🌟 Focus: ${phone.knownFor}\n\n`;
      text += `⚡ PERFORMANCE:\n- Chipset: ${phone.perf.chip}\n- CPU/GPU: ${phone.perf.cpu} | ${phone.perf.gpu}\n- AnTuTu Score: ${phone.antutu.toLocaleString()}\n- OS: ${phone.perf.os} (${phone.perf.ui})\n\n`;
      text += `📱 DISPLAY:\n- Screen: ${phone.display.size} ${phone.display.panel}\n- Resolution: ${phone.display.resolution} @ ${phone.display.refresh}\n- Brightness: Peak ${phone.display.peakBright} (HBM ${phone.display.hbm})\n\n`;
      text += `📸 CAMERAS:\n- Rear Setup: ${phone.camRear.main}\n- Ultra-wide: ${phone.camRear.ultrawide}\n- Telephoto: ${phone.camRear.telephoto}\n- Front Camera: ${phone.camSelfie.main}\n\n`;
      text += `🔋 BATTERY & BUILD:\n- Power: ${phone.bat.cap} (${phone.bat.wired})\n- Aesthetics: ${phone.body.colors || 'Standard'}\n- Durability: ${phone.body.weight} | ${phone.body.ip}\n\n`;
      
      const shareUrl = `${window.location.origin}${window.location.pathname}?phone=${slug}`;
      text += `🔗 *View Interactive Catalog Live Here:* ${shareUrl}`;

      if (navigator.share) {
        navigator.share({ title: phone.name, text: text, url: shareUrl }).catch(() => copyTextFallback(text));
      } else {
        copyTextFallback(text);
      }
    }

    function sendComparison() {
      if(selectedForCompare.length < 2) return;
      const phones = mobiles.filter(m => selectedForCompare.includes(m.slug));
      
      let text = `⚔️ *Vinit Mobile Product Comparison Clash* ⚔️\n\n`;
      phones.forEach((p, idx) => {
        const vIdx = selectedVariants[p.slug];
        text += `${idx + 1}. ${p.name} (${p.variants[vIdx].ramRom})\n`;
        text += `   - Price: ${p.variants[vIdx].price}\n`;
        text += `   - SoC: ${p.perf.chip}\n`;
        text += `   - AnTuTu Benchmark: ${p.antutu.toLocaleString()}\n`;
        text += `   - Colors Available: ${p.body.colors || '-'}\n\n`;
      });

      const shareUrl = `${window.location.origin}${window.location.pathname}?compare=${selectedForCompare.join(',')}`;
      text += `🔗 *View Full Dynamic Matrix Grid Online:* ${shareUrl}`;

      if (navigator.share) {
        navigator.share({ title: "Vinit Mobile Specs Comparison", text: text, url: shareUrl }).catch(() => copyTextFallback(text));
      } else {
        copyTextFallback(text);
      }
    }
